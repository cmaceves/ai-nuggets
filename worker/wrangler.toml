name = "podcast"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "DB"
database_name = "podcast"
database_id = "d834ec7f-6cba-4069-b744-fa0bec99918d"

# Analytics Engine disabled — optional per-request analytics. D1 already logs
# the same request data. Re-enable by uncommenting after enabling Analytics
# Engine on the account (dash → Workers → Analytics Engine).
# [[analytics_engine_datasets]]
# binding = "AE"
# dataset = "podcast_requests"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ai-nuggets-episodes"

[vars]
ALLOWED_PODCASTS = "biomedical-agentic-ai,blackbird-brief,calibr-briefing,justice-biotech-brief,receptor-and-reason,scripps-biomed-brief,genome-brief,paper-overview"
FEED_BASE = "https://raw.githubusercontent.com/cmaceves/ai-nuggets/main/podcasts"
